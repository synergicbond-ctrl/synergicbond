<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">From Pig Iron to Steel</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">All routes are controlled oxidation followed by composition correction.</text><rect x="70" y="260" width="320" height="210" rx="22" fill="#101b2e" stroke="#cbd5e1" stroke-width="4"/><text x="230.0" y="315" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="30" font-weight="700">PIG IRON</text><text x="230.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">C · Si · Mn · P · S</text><rect x="470" y="260" width="320" height="210" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="630.0" y="315" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">BESSEMER / THOMAS</text><text x="630.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">air · acid/basic lining</text><rect x="870" y="260" width="320" height="210" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="1030.0" y="315" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">OPEN HEARTH</text><text x="1030.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">historical slow control</text><rect x="1270" y="260" width="260" height="210" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="1400.0" y="315" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">LD / BOF</text><text x="1400.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">high-purity O₂</text><text x="800" y="600" text-anchor="middle" fill="#d8e7f5" font-family="Arial" font-size="33">Oxidise impurities → remove gas/slag → restore alloy composition</text></svg>