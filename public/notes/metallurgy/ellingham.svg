<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img"><style>.bg{fill:#0e1626}.card{fill:#111c30;stroke:#334a6b;stroke-width:2}.t{fill:#eaf2ff;font:600 22px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.s{fill:#a9bdd5;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.a{stroke:#47d7ff;stroke-width:3;fill:none;marker-end:url(#m)}.hot{fill:#ffb86b}.cyan{fill:#5de1ff}.green{fill:#78e6ad}.line{stroke:#7891b2;stroke-width:2;fill:none}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#47d7ff"/></marker></defs><rect class="bg" width="900" height="500" rx="20"/><text class="t" x="45" y="50">Ellingham diagram — how to read reduction feasibility</text><path class="line" d="M100 420 V100 M100 420 H820"/><text class="s" x="25" y="115">ΔG°</text><text class="s" x="810" y="455">T</text><path d="M120 360 L780 120" stroke="#ffab6b" stroke-width="4"/><path d="M120 300 L780 340" stroke="#5de1ff" stroke-width="4"/><text class="s" x="600" y="150">M → MO (example upper line)</text><text class="s" x="560" y="370">reducing-agent oxidation line</text><path class="a" d="M500 230 L500 320"/><text class="s" x="290" y="215">if reducer oxidation line lies below oxide line → reduction feasible</text></svg>