<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" role="img"><style>.bg{fill:#0e1626}.card{fill:#111c30;stroke:#334a6b;stroke-width:2}.t{fill:#eaf2ff;font:600 22px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.s{fill:#a9bdd5;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.a{stroke:#47d7ff;stroke-width:3;fill:none;marker-end:url(#m)}.hot{fill:#ffb86b}.cyan{fill:#5de1ff}.green{fill:#78e6ad}.line{stroke:#7891b2;stroke-width:2;fill:none}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#47d7ff"/></marker></defs><rect class="bg" width="900" height="390" rx="20"/><rect class="card" x="70" y="90" width="310" height="170" rx="14"/><text class="t" x="88" y="122">Calcination</text><text class="s" x="88" y="148">limited / no air</text><rect class="card" x="520" y="90" width="310" height="170" rx="14"/><text class="t" x="538" y="122">Roasting</text><text class="s" x="538" y="148">excess air / O₂</text><text class="s" x="105" y="190">carbonate / hydrate → oxide</text><text class="s" x="105" y="222">CO₂ / H₂O removed</text><text class="s" x="555" y="190">sulphide → oxide / sulphate</text><text class="s" x="555" y="222">SO₂ / volatile oxides removed</text><text class="t" x="285" y="335">Keep below serious sintering → preserve porosity</text></svg>