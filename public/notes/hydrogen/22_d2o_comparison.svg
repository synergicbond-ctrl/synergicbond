<svg xmlns="http://www.w3.org/2000/svg" width="700" height="440" viewBox="0 0 700 440">
<title>Heavy water comparison</title>
<style>
.title{font:700 25px Arial,sans-serif;fill:#111} .subtitle{font:600 16px Arial,sans-serif;fill:#222}
.label{font:14px Arial,sans-serif;fill:#222} .small{font:12px Arial,sans-serif;fill:#333} .tiny{font:11px Arial,sans-serif;fill:#444}
.box{fill:#f6f8fb;stroke:#30445f;stroke-width:2;rx:12;ry:12}
.blue{fill:#eef4ff;stroke:#355c9a;stroke-width:2;rx:12;ry:12}
.green{fill:#eefaf0;stroke:#39814f;stroke-width:2;rx:12;ry:12}
.orange{fill:#fef6ea;stroke:#b8740b;stroke-width:2;rx:12;ry:12}
.red{fill:#fff1f1;stroke:#b24848;stroke-width:2;rx:12;ry:12}
.arrow{stroke:#333;stroke-width:2.2;fill:none;marker-end:url(#a)}
.bond{stroke:#222;stroke-width:3;fill:none} .dash{stroke:#596b7d;stroke-width:2;fill:none;stroke-dasharray:5 5}
.hbond{stroke:#2e6da4;stroke-width:2.3;fill:none;stroke-dasharray:4 5}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#333"/></marker></defs>

<text x="24" y="38" class="title">H₂O vs D₂O — Isotope Effects</text>
<rect x="45" y="85" width="275" height="280" class="blue"/><text x="155" y="118" class="subtitle">H₂O</text>
<text x="70" y="160" class="small">Molar mass ≈ 18.015 g mol⁻¹</text><text x="70" y="190" class="small">m.p. ≈ 273 K</text><text x="70" y="220" class="small">b.p. ≈ 373 K</text><text x="70" y="250" class="small">lower density than D₂O</text><text x="70" y="280" class="small">greater auto-ionisation</text><text x="70" y="310" class="small">O–H cleavage generally faster</text>
<rect x="380" y="85" width="275" height="280" class="green"/><text x="490" y="118" class="subtitle">D₂O</text>
<text x="405" y="160" class="small">Molar mass ≈ 20.028 g mol⁻¹</text><text x="405" y="190" class="small">m.p. ≈ 276.8 K</text><text x="405" y="220" class="small">b.p. ≈ 374.4 K</text><text x="405" y="250" class="small">higher density</text><text x="405" y="280" class="small">lower auto-ionisation</text><text x="405" y="310" class="small">used as moderator / isotope reagent</text>
<rect x="95" y="390" width="510" height="35" class="box"/><text x="115" y="413" class="small">Heavier isotope → lower vibrational frequency and stronger effective X–D bonds.</text>
</svg>