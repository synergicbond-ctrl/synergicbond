<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">Heat Treatment of Steel</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">Thermal history changes phase and microstructure.</text><rect x="100" y="250" width="300" height="190" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="250.0" y="305" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">ANNEAL</text><text x="250.0" y="342" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">heat → slow cool</text><rect x="480" y="250" width="300" height="190" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="630.0" y="305" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">QUENCH</text><text x="630.0" y="342" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">heat → rapid cool</text><rect x="860" y="250" width="300" height="190" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="1010.0" y="305" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">TEMPER</text><text x="1010.0" y="342" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">reheat hardened steel</text><rect x="1240" y="250" width="260" height="190" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="1370.0" y="305" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">CASE HARDEN</text><text x="1370.0" y="342" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">C/N enriched surface</text><text x="800" y="600" text-anchor="middle" fill="#d8e7f5" font-size="32" font-family="Arial">Microstructure, not composition alone, controls hardness and toughness.</text></svg>