<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">Zinc Extraction Is a Vapour-Handling Problem</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">Reduction occurs above the boiling point of zinc, so condensation and distillation are central.</text><rect x="70" y="270" width="270" height="190" rx="22" fill="#101b2e" stroke="#cbd5e1" stroke-width="4"/><text x="205.0" y="325" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="30" font-weight="700">ZnS / ZnCO₃</text><text x="205.0" y="362" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">concentrate</text><path d="M340 365 L480 365" stroke="#22d3ee" stroke-width="10" fill="none"/><path d="M462 347 L480 365 L462 383" stroke="#22d3ee" stroke-width="10" fill="none"/><rect x="480" y="270" width="270" height="190" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="615.0" y="325" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">ZnO</text><text x="615.0" y="362" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">roast / calcine</text><path d="M750 365 L890 365" stroke="#22d3ee" stroke-width="10" fill="none"/><path d="M872 347 L890 365 L872 383" stroke="#22d3ee" stroke-width="10" fill="none"/><rect x="890" y="270" width="270" height="190" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="1025.0" y="325" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">1300–1400°C</text><text x="1025.0" y="362" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">C reduction → Zn(g)</text><path d="M1160 365 L1300 365" stroke="#22d3ee" stroke-width="10" fill="none"/><path d="M1282 347 L1300 365 L1282 383" stroke="#22d3ee" stroke-width="10" fill="none"/><rect x="1300" y="270" width="230" height="190" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="1415.0" y="325" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">CONDENSE / REFINE</text><text x="1415.0" y="362" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">99.99% Zn</text></svg>