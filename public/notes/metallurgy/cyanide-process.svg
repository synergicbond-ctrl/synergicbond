<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">MacArthur–Forrest Cyanide Process</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">Leach selectively, filter gangue, then displace the noble metal from solution.</text><rect x="90" y="270" width="340" height="190" rx="22" fill="#101b2e" stroke="#cbd5e1" stroke-width="4"/><text x="260.0" y="325" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="30" font-weight="700">CRUSHED Au/Ag ORE</text><text x="260.0" y="362" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">+ dilute CN⁻ + O₂</text><path d="M430 365 L620 365" stroke="#22d3ee" stroke-width="10" fill="none"/><path d="M602 347 L620 365 L602 383" stroke="#22d3ee" stroke-width="10" fill="none"/><rect x="620" y="270" width="360" height="190" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="800.0" y="325" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">SOLUBLE CYANO COMPLEX</text><text x="800.0" y="362" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">[M(CN)₂]⁻</text><path d="M980 365 L1160 365" stroke="#fb923c" stroke-width="10" fill="none"/><path d="M1142 347 L1160 365 L1142 383" stroke="#fb923c" stroke-width="10" fill="none"/><rect x="1160" y="270" width="350" height="190" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="1335.0" y="325" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">Zn DISPLACEMENT</text><text x="1335.0" y="362" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">crude Au / Ag ↓</text><text x="800" y="620" text-anchor="middle" fill="#d8e7f5" font-size="31" font-family="Arial">Oxygen enables dissolution · Zn recovers the noble metal</text></svg>