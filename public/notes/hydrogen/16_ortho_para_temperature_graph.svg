<svg xmlns="http://www.w3.org/2000/svg" width="700" height="450" viewBox="0 0 700 450">
<title>Ortho para temperature graph</title>
<style>
.title{font:700 25px Arial,sans-serif;fill:#111} .subtitle{font:600 16px Arial,sans-serif;fill:#222}
.label{font:14px Arial,sans-serif;fill:#222} .small{font:12px Arial,sans-serif;fill:#333} .tiny{font:11px Arial,sans-serif;fill:#444}
.box{fill:#f6f8fb;stroke:#30445f;stroke-width:2;rx:12;ry:12}
.blue{fill:#eef4ff;stroke:#355c9a;stroke-width:2;rx:12;ry:12}
.green{fill:#eefaf0;stroke:#39814f;stroke-width:2;rx:12;ry:12}
.orange{fill:#fef6ea;stroke:#b8740b;stroke-width:2;rx:12;ry:12}
.red{fill:#fff1f1;stroke:#b24848;stroke-width:2;rx:12;ry:12}
.arrow{stroke:#333;stroke-width:2.2;fill:none;marker-end:url(#a)}
.bond{stroke:#222;stroke-width:3;fill:none} .dash{stroke:#596b7d;stroke-width:2;fill:none;stroke-dasharray:5 5}
.hbond{stroke:#2e6da4;stroke-width:2.3;fill:none;stroke-dasharray:4 5}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#333"/></marker></defs>

<text x="25" y="38" class="title">Ortho/Para H₂: Equilibrium Composition vs Temperature</text>
<line x1="85" y1="360" x2="650" y2="360" stroke="#333" stroke-width="2"/>
<line x1="85" y1="360" x2="85" y2="80" stroke="#333" stroke-width="2"/>
<text x="570" y="390" class="label">Temperature →</text><text x="18" y="105" class="label" transform="rotate(-90 18 105)">Mole fraction</text>
<line x1="80" y1="290" x2="90" y2="290" stroke="#333"/><text x="48" y="295" class="small">25%</text>
<line x1="80" y1="150" x2="90" y2="150" stroke="#333"/><text x="48" y="155" class="small">75%</text>
<path d="M95,335 C170,320 230,265 310,205 C390,165 510,150 640,150" fill="none" stroke="#355c9a" stroke-width="4"/>
<path d="M95,85 C170,100 230,155 310,215 C390,255 510,290 640,290" fill="none" stroke="#39814f" stroke-width="4"/>
<text x="530" y="136" class="subtitle">ortho ≈ 75%</text><text x="530" y="315" class="subtitle">para ≈ 25%</text>
<text x="105" y="105" class="subtitle">very low T: para dominates</text>
<rect x="95" y="390" width="520" height="40" class="box"/><text x="112" y="415" class="small">Para-H₂ is lower in energy; high-T statistical limit approaches ortho:para ≈ 3:1.</text>
</svg>