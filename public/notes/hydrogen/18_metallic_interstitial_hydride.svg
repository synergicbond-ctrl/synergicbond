<svg xmlns="http://www.w3.org/2000/svg" width="700" height="440" viewBox="0 0 700 440">
<title>Metallic hydride</title>
<style>
.title{font:700 25px Arial,sans-serif;fill:#111} .subtitle{font:600 16px Arial,sans-serif;fill:#222}
.label{font:14px Arial,sans-serif;fill:#222} .small{font:12px Arial,sans-serif;fill:#333} .tiny{font:11px Arial,sans-serif;fill:#444}
.box{fill:#f6f8fb;stroke:#30445f;stroke-width:2;rx:12;ry:12}
.blue{fill:#eef4ff;stroke:#355c9a;stroke-width:2;rx:12;ry:12}
.green{fill:#eefaf0;stroke:#39814f;stroke-width:2;rx:12;ry:12}
.orange{fill:#fef6ea;stroke:#b8740b;stroke-width:2;rx:12;ry:12}
.red{fill:#fff1f1;stroke:#b24848;stroke-width:2;rx:12;ry:12}
.arrow{stroke:#333;stroke-width:2.2;fill:none;marker-end:url(#a)}
.bond{stroke:#222;stroke-width:3;fill:none} .dash{stroke:#596b7d;stroke-width:2;fill:none;stroke-dasharray:5 5}
.hbond{stroke:#2e6da4;stroke-width:2.3;fill:none;stroke-dasharray:4 5}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#333"/></marker></defs>

<text x="24" y="38" class="title">Metallic / “Interstitial” Hydride Concept</text>
<rect x="45" y="85" width="360" height="290" class="box"/>
<text x="125" y="115" class="subtitle">Metal lattice with absorbed hydrogen</text>
<g transform="translate(85,145)">
<circle cx="0" cy="0" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="90" cy="0" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="180" cy="0" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="270" cy="0" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="0" cy="70" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="90" cy="70" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="180" cy="70" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="270" cy="70" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="0" cy="140" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="90" cy="140" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="180" cy="140" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/><circle cx="270" cy="140" r="17" fill="#c9d2dc" stroke="#30445f" stroke-width="2"/>
<circle cx="45" cy="35" r="9" fill="#f4b183" stroke="#b8740b" stroke-width="2"/><text x="39" y="39" class="tiny">H</text>
<circle cx="135" cy="105" r="9" fill="#f4b183" stroke="#b8740b" stroke-width="2"/><text x="129" y="109" class="tiny">H</text>
<circle cx="225" cy="35" r="9" fill="#f4b183" stroke="#b8740b" stroke-width="2"/><text x="219" y="39" class="tiny">H</text>
<circle cx="315" cy="105" r="9" fill="#f4b183" stroke="#b8740b" stroke-width="2"/><text x="309" y="109" class="tiny">H</text>
</g>
<rect x="440" y="100" width="220" height="240" class="orange"/><text x="470" y="130" class="subtitle">Key properties</text>
<text x="460" y="165" class="small">• variable H content: MHₓ</text>
<text x="460" y="195" class="small">• often metallic conductivity</text>
<text x="460" y="225" class="small">• lattice expansion / brittleness</text>
<text x="460" y="255" class="small">• reversible H uptake in some metals</text>
<text x="460" y="285" class="small">• useful for storage/catalysis concepts</text>
<text x="460" y="315" class="tiny">“Interstitial” is a historical simplification;</text><text x="460" y="330" class="tiny">many real hydrides reconstruct their lattices.</text>
</svg>