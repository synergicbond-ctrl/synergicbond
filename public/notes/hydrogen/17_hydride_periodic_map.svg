<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500">
<title>Hydride periodic map</title>
<style>
.title{font:700 25px Arial,sans-serif;fill:#111} .subtitle{font:600 16px Arial,sans-serif;fill:#222}
.label{font:14px Arial,sans-serif;fill:#222} .small{font:12px Arial,sans-serif;fill:#333} .tiny{font:11px Arial,sans-serif;fill:#444}
.box{fill:#f6f8fb;stroke:#30445f;stroke-width:2;rx:12;ry:12}
.blue{fill:#eef4ff;stroke:#355c9a;stroke-width:2;rx:12;ry:12}
.green{fill:#eefaf0;stroke:#39814f;stroke-width:2;rx:12;ry:12}
.orange{fill:#fef6ea;stroke:#b8740b;stroke-width:2;rx:12;ry:12}
.red{fill:#fff1f1;stroke:#b24848;stroke-width:2;rx:12;ry:12}
.arrow{stroke:#333;stroke-width:2.2;fill:none;marker-end:url(#a)}
.bond{stroke:#222;stroke-width:3;fill:none} .dash{stroke:#596b7d;stroke-width:2;fill:none;stroke-dasharray:5 5}
.hbond{stroke:#2e6da4;stroke-width:2.3;fill:none;stroke-dasharray:4 5}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#333"/></marker></defs>

<text x="22" y="36" class="title">Hydride Classification — Periodic-Table Map</text>
<text x="22" y="62" class="small">Schematic exam map; boundaries are classification trends, not absolute modern high-pressure chemistry limits.</text>
<!-- columns -->
<rect x="40" y="95" width="90" height="300" class="green"/><text x="58" y="120" class="subtitle">s-block</text><text x="51" y="150" class="small">Group 1</text><text x="51" y="172" class="small">Ca, Sr, Ba</text><text x="48" y="205" class="small">mostly ionic</text>
<rect x="150" y="95" width="340" height="300" class="orange"/><text x="290" y="120" class="subtitle">d / f block</text><text x="180" y="150" class="small">many metallic/non-stoichiometric hydrides</text>
<rect x="270" y="205" width="140" height="90" class="red"/><text x="300" y="235" class="subtitle">hydride gap</text><text x="290" y="260" class="small">Groups 7–9 (NCERT trend)</text>
<text x="176" y="335" class="small">CrH: standard Group-6 exception</text>
<rect x="510" y="95" width="210" height="300" class="blue"/><text x="580" y="120" class="subtitle">p-block</text>
<text x="530" y="155" class="small">Group 13: electron-deficient</text>
<text x="530" y="185" class="small">Group 14: electron-precise</text>
<text x="530" y="215" class="small">Groups 15–17: electron-rich</text>
<text x="530" y="255" class="small">mostly covalent/molecular</text>
<rect x="40" y="420" width="680" height="48" class="box"/><text x="55" y="449" class="small">Exceptions: BeH₂ polymeric covalent; MgH₂ is not a simple textbook saline hydride.</text>
</svg>