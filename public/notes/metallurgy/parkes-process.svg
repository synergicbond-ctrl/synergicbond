<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">Parkes Desilverisation of Lead</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">Use preferential solubility and phase separation — not a redox reaction.</text><rect x="80" y="280" width="350" height="200" rx="22" fill="#101b2e" stroke="#cbd5e1" stroke-width="4"/><text x="255.0" y="335" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="30" font-weight="700">MOLTEN Pb + Ag</text><text x="255.0" y="372" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">argentiferous lead</text><path d="M430 380 L610 380" stroke="#22d3ee" stroke-width="10" fill="none"/><path d="M592 362 L610 380 L592 398" stroke="#22d3ee" stroke-width="10" fill="none"/><rect x="610" y="280" width="360" height="200" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="790.0" y="335" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">ADD Zn + COOL</text><text x="790.0" y="372" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Ag partitions into Zn-rich phase</text><path d="M970 380 L1150 380" stroke="#fb923c" stroke-width="10" fill="none"/><path d="M1132 362 L1150 380 L1132 398" stroke="#fb923c" stroke-width="10" fill="none"/><rect x="1150" y="280" width="360" height="200" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="1330.0" y="335" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">SKIM + DISTIL Zn</text><text x="1330.0" y="372" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Ag-rich residue</text></svg>