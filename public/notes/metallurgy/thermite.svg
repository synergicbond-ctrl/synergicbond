<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" role="img"><style>.bg{fill:#0e1626}.card{fill:#111c30;stroke:#334a6b;stroke-width:2}.t{fill:#eaf2ff;font:600 22px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.s{fill:#a9bdd5;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.a{stroke:#47d7ff;stroke-width:3;fill:none;marker-end:url(#m)}.hot{fill:#ffb86b}.cyan{fill:#5de1ff}.green{fill:#78e6ad}.line{stroke:#7891b2;stroke-width:2;fill:none}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#47d7ff"/></marker></defs><rect class="bg" width="900" height="410" rx="20"/><text class="t" x="40" y="45">Aluminothermic / thermite reduction</text><rect class="card" x="80" y="110" width="240" height="110" rx="14"/><text class="t" x="98" y="142">Metal oxide</text><text class="s" x="98" y="168">e.g. Fe₂O₃</text><rect class="card" x="80" y="270" width="240" height="110" rx="14"/><text class="t" x="98" y="302">Al powder</text><text class="s" x="98" y="328">strong O affinity</text><path class="a" d="M320,165 L520,220"/><path class="a" d="M320,325 L520,250"/><rect class="card" x="520" y="170" width="300" height="120" rx="14"/><text class="t" x="538" y="202">Al₂O₃ + metal</text><text class="s" x="538" y="228">very exothermic</text><text class="s" x="515" y="340">Used when thermodynamics strongly favour Al₂O₃ formation</text></svg>