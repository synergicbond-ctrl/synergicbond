<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">The Chemistry of Froth Flotation</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">Reagents change surface behaviour; bubbles do the physical transport.</text><rect x="80" y="250" width="360" height="190" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="260.0" y="305" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">COLLECTOR</text><text x="260.0" y="342" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">xanthate → hydrophobic surface</text><rect x="620" y="250" width="360" height="190" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="800.0" y="305" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">ACTIVATOR</text><text x="800.0" y="342" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">CuSO₄ / sulphidisation</text><rect x="1160" y="250" width="360" height="190" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="1340.0" y="305" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">DEPRESSANT</text><text x="1340.0" y="342" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">selectively suppresses flotation</text><path d="M440 345 L620 345" stroke="#fb923c" stroke-width="10" fill="none"/><path d="M602 327 L620 345 L602 363" stroke="#fb923c" stroke-width="10" fill="none"/><path d="M980 345 L1160 345" stroke="#22d3ee" stroke-width="10" fill="none"/><path d="M1142 327 L1160 345 L1142 363" stroke="#22d3ee" stroke-width="10" fill="none"/><circle cx="800" cy="630" r="120" fill="#14243a" stroke="#22d3ee" stroke-width="6"/><circle cx="760" cy="590" r="34" fill="#cbd5e1"/><circle cx="850" cy="570" r="42" fill="#cbd5e1"/><circle cx="820" cy="670" r="38" fill="#cbd5e1"/><text x="800" y="815" text-anchor="middle" fill="#d8e7f5" font-size="28" font-family="Arial">Bubble–particle attachment is the final selection event.</text></svg>