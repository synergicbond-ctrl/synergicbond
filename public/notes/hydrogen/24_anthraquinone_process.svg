<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430">
<title>Anthraquinone process</title>
<style>
.title{font:700 25px Arial,sans-serif;fill:#111} .subtitle{font:600 16px Arial,sans-serif;fill:#222}
.label{font:14px Arial,sans-serif;fill:#222} .small{font:12px Arial,sans-serif;fill:#333} .tiny{font:11px Arial,sans-serif;fill:#444}
.box{fill:#f6f8fb;stroke:#30445f;stroke-width:2;rx:12;ry:12}
.blue{fill:#eef4ff;stroke:#355c9a;stroke-width:2;rx:12;ry:12}
.green{fill:#eefaf0;stroke:#39814f;stroke-width:2;rx:12;ry:12}
.orange{fill:#fef6ea;stroke:#b8740b;stroke-width:2;rx:12;ry:12}
.red{fill:#fff1f1;stroke:#b24848;stroke-width:2;rx:12;ry:12}
.arrow{stroke:#333;stroke-width:2.2;fill:none;marker-end:url(#a)}
.bond{stroke:#222;stroke-width:3;fill:none} .dash{stroke:#596b7d;stroke-width:2;fill:none;stroke-dasharray:5 5}
.hbond{stroke:#2e6da4;stroke-width:2.3;fill:none;stroke-dasharray:4 5}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#333"/></marker></defs>

<text x="24" y="38" class="title">Industrial H₂O₂ — Anthraquinone Cycle</text>
<rect x="40" y="95" width="180" height="90" class="blue"/><text x="72" y="125" class="subtitle">Alkyl anthraquinone</text><text x="78" y="153" class="small">organic carrier</text>
<rect x="290" y="95" width="180" height="90" class="green"/><text x="333" y="125" class="subtitle">Hydrogenation</text><text x="320" y="153" class="small">H₂ / catalyst → anthraquinol</text>
<rect x="540" y="95" width="180" height="90" class="orange"/><text x="586" y="125" class="subtitle">Oxidation</text><text x="567" y="153" class="small">air/O₂ regenerates quinone</text>
<line x1="220" y1="140" x2="290" y2="140" class="arrow"/><line x1="470" y1="140" x2="540" y2="140" class="arrow"/>
<rect x="540" y="250" width="180" height="85" class="red"/><text x="585" y="280" class="subtitle">H₂O₂ formed</text><text x="566" y="307" class="small">extract into water phase</text>
<line x1="630" y1="185" x2="630" y2="250" class="arrow"/>
<rect x="290" y="250" width="180" height="85" class="blue"/><text x="336" y="280" class="subtitle">Separation</text><text x="308" y="307" class="small">extract + concentrate H₂O₂</text>
<line x1="540" y1="292" x2="470" y2="292" class="arrow"/>
<path d="M290 292 C180 350 80 330 95 185" class="arrow"/>
<text x="78" y="365" class="small">Carrier is recycled: this is a cyclic process, not stoichiometric consumption of anthraquinone.</text>
</svg>