<svg xmlns="http://www.w3.org/2000/svg" width="700" height="430" viewBox="0 0 700 430">
<title>Atomic hydrogen torch</title>
<style>
.title{font:700 25px Arial,sans-serif;fill:#111} .subtitle{font:600 16px Arial,sans-serif;fill:#222}
.label{font:14px Arial,sans-serif;fill:#222} .small{font:12px Arial,sans-serif;fill:#333} .tiny{font:11px Arial,sans-serif;fill:#444}
.box{fill:#f6f8fb;stroke:#30445f;stroke-width:2;rx:12;ry:12}
.blue{fill:#eef4ff;stroke:#355c9a;stroke-width:2;rx:12;ry:12}
.green{fill:#eefaf0;stroke:#39814f;stroke-width:2;rx:12;ry:12}
.orange{fill:#fef6ea;stroke:#b8740b;stroke-width:2;rx:12;ry:12}
.red{fill:#fff1f1;stroke:#b24848;stroke-width:2;rx:12;ry:12}
.arrow{stroke:#333;stroke-width:2.2;fill:none;marker-end:url(#a)}
.bond{stroke:#222;stroke-width:3;fill:none} .dash{stroke:#596b7d;stroke-width:2;fill:none;stroke-dasharray:5 5}
.hbond{stroke:#2e6da4;stroke-width:2.3;fill:none;stroke-dasharray:4 5}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#333"/></marker></defs>

<text x="25" y="38" class="title">Atomic Hydrogen Torch — Principle</text>
<rect x="35" y="90" width="150" height="80" class="blue"/><text x="75" y="120" class="subtitle">H₂ feed</text><text x="52" y="145" class="small">molecular hydrogen</text>
<line x1="185" y1="130" x2="255" y2="130" class="arrow"/>
<rect x="255" y="75" width="190" height="110" class="orange"/><text x="290" y="108" class="subtitle">Electric arc</text><text x="276" y="136" class="small">H₂ → 2H</text><text x="276" y="158" class="small">strong H–H bond is broken</text>
<line x1="445" y1="130" x2="520" y2="130" class="arrow"/>
<rect x="520" y="85" width="145" height="90" class="green"/><text x="550" y="116" class="subtitle">Atomic H</text><text x="536" y="143" class="small">very reactive stream</text>
<line x1="590" y1="175" x2="590" y2="245" class="arrow"/>
<rect x="490" y="245" width="175" height="105" class="red"/><text x="525" y="275" class="subtitle">Metal surface</text><text x="506" y="301" class="small">2H → H₂ + heat</text><text x="506" y="324" class="small">local temperature ~4000 K</text>
<path d="M565 210 C545 225 610 225 585 245" fill="none" stroke="#b24848" stroke-width="4"/>
<rect x="35" y="235" width="390" height="115" class="box"/><text x="55" y="265" class="subtitle">Why it becomes extremely hot</text><text x="55" y="291" class="small">Energy absorbed to dissociate H₂ is released again when H atoms recombine on the work surface.</text><text x="55" y="315" class="small">The torch exploits the large H–H bond dissociation enthalpy rather than “burning” atomic H alone.</text>
</svg>