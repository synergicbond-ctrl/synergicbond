<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">Matching Reactivity to Metal-Winning Method</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">Thermodynamics sets what is possible; economics and kinetics choose what is used.</text><rect x="80" y="260" width="300" height="210" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="230.0" y="315" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">VERY REACTIVE</text><text x="230.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Na · Mg · Ca · Al</text><rect x="450" y="260" width="300" height="210" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="600.0" y="315" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">INTERMEDIATE</text><text x="600.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Zn · Fe · Sn · Pb</text><rect x="820" y="260" width="300" height="210" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="970.0" y="315" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">OXIDE HARD TO C-REDUCE</text><text x="970.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Cr · Mn → Al thermite</text><rect x="1190" y="260" width="300" height="210" rx="22" fill="#101b2e" stroke="#cbd5e1" stroke-width="4"/><text x="1340.0" y="315" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="30" font-weight="700">LESS REACTIVE</text><text x="1340.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Cu · Hg · Ag · Au</text><text x="230" y="560" text-anchor="middle" fill="#d8e7f5" font-size="27" font-family="Arial">molten-salt electrolysis</text><text x="600" y="560" text-anchor="middle" fill="#d8e7f5" font-size="27" font-family="Arial">C/CO smelting</text><text x="970" y="560" text-anchor="middle" fill="#d8e7f5" font-size="27" font-family="Arial">aluminothermy</text><text x="1340" y="560" text-anchor="middle" fill="#d8e7f5" font-size="27" font-family="Arial">self-reduction / leaching / native</text></svg>