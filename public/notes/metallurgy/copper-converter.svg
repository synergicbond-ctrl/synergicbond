<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">Copper Converter: Two Chemistries, One Vessel</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">First remove iron; then exploit Cu₂O/Cu₂S self-reduction.</text><rect x="80" y="230" width="380" height="210" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="270.0" y="285" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">ROAST MATTE</text><text x="270.0" y="322" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Cu₂S + FeS</text><rect x="610" y="230" width="380" height="210" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="800.0" y="285" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">STAGE 1</text><text x="800.0" y="322" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">FeS → FeO → FeSiO₃ slag</text><rect x="1140" y="230" width="380" height="210" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="1330.0" y="285" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">STAGE 2</text><text x="1330.0" y="322" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Cu₂S ⇌ Cu₂O → Cu + SO₂</text><text x="800" y="600" text-anchor="middle" fill="#d8e7f5" font-size="32" font-family="Arial">When Fe is removed, partial Cu oxidation enables self-reduction to blister copper.</text></svg>