<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1540 290" role="img"><style>.bg{fill:#0e1626}.card{fill:#111c30;stroke:#334a6b;stroke-width:2}.t{fill:#eaf2ff;font:600 22px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.s{fill:#a9bdd5;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.a{stroke:#47d7ff;stroke-width:3;fill:none;marker-end:url(#m)}.hot{fill:#ffb86b}.cyan{fill:#5de1ff}.green{fill:#78e6ad}.line{stroke:#7891b2;stroke-width:2;fill:none}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#47d7ff"/></marker></defs><rect class="bg" width="1540" height="290" rx="20"/><rect class="card" x="40" y="110" width="190" height="90" rx="14"/><text class="t" x="58" y="142">Cassiterite SnO₂</text><text class="s" x="58" y="168">gravity wash</text><path class="a" d="M230,155 L300,155"/><rect class="card" x="300" y="110" width="190" height="90" rx="14"/><text class="t" x="318" y="142">Roast + wash</text><text class="s" x="318" y="168">remove sulphides</text><path class="a" d="M490,155 L560,155"/><rect class="card" x="560" y="110" width="190" height="90" rx="14"/><text class="t" x="578" y="142">Magnetic sep.</text><text class="s" x="578" y="168">remove wolframite</text><path class="a" d="M750,155 L820,155"/><rect class="card" x="820" y="110" width="190" height="90" rx="14"/><text class="t" x="838" y="142">Smelting</text><text class="s" x="838" y="168">C + CaCO₃</text><path class="a" d="M1010,155 L1080,155"/><rect class="card" x="1080" y="110" width="180" height="90" rx="14"/><text class="t" x="1098" y="142">Crude Sn</text><text class="s" x="1098" y="168">liquation/poling</text><path class="a" d="M1260,155 L1325,155"/><rect class="card" x="1325" y="110" width="170" height="90" rx="14"/><text class="t" x="1343" y="142">Electrorefine</text><text class="s" x="1343" y="168">pure Sn</text></svg>