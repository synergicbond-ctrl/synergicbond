<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e2b40" stroke-width="1"/></pattern><linearGradient id="c" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="o" x1="0" x2="1"><stop stop-color="#fb923c"/><stop offset="1" stop-color="#b45309"/></linearGradient></defs><rect width="1600" height="900" fill="#0b1220"/><rect width="1600" height="900" fill="url(#g)"/><rect x="38" y="38" width="1524" height="824" rx="24" fill="none" stroke="#40546f" stroke-width="3"/><text x="80" y="105" fill="#d8e7f5" font-family="Arial,sans-serif" font-size="56" font-weight="800">Vapour-Phase Refining</text><text x="82" y="150" fill="#8aa0b5" font-family="Arial,sans-serif" font-size="25">Purify by making the metal temporarily volatile.</text><rect x="100" y="260" width="580" height="230" rx="22" fill="#101b2e" stroke="#22d3ee" stroke-width="4"/><text x="390.0" y="315" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="30" font-weight="700">MOND — Ni</text><text x="390.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">Ni + 4CO ⇌ Ni(CO)₄(g) → pure Ni</text><rect x="920" y="260" width="580" height="230" rx="22" fill="#101b2e" stroke="#fb923c" stroke-width="4"/><text x="1210.0" y="315" text-anchor="middle" fill="#fb923c" font-family="Arial" font-size="30" font-weight="700">VAN ARKEL–DE BOER</text><text x="1210.0" y="352" text-anchor="middle" fill="#8aa0b5" font-family="Arial" font-size="20">volatile iodide → hot filament → pure Ti/Zr/Hf</text><text x="800" y="620" text-anchor="middle" fill="#d8e7f5" font-size="30" font-family="Arial">Intermediate must be volatile and decomposable under practical conditions.</text></svg>