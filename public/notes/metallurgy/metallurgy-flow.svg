<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1365 270" role="img"><style>.bg{fill:#0e1626}.card{fill:#111c30;stroke:#334a6b;stroke-width:2}.t{fill:#eaf2ff;font:600 22px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.s{fill:#a9bdd5;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.a{stroke:#47d7ff;stroke-width:3;fill:none;marker-end:url(#m)}.hot{fill:#ffb86b}.cyan{fill:#5de1ff}.green{fill:#78e6ad}.line{stroke:#7891b2;stroke-width:2;fill:none}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#47d7ff"/></marker></defs><rect class="bg" width="1365" height="270" rx="20"/><rect class="card" x="35" y="85" width="185" height="90" rx="14"/><text class="t" x="53" y="117">Ore</text><text class="s" x="53" y="143">crush + grind</text><path class="a" d="M220,130 L285,130"/><rect class="card" x="285" y="85" width="220" height="90" rx="14"/><text class="t" x="303" y="117">Concentration</text><text class="s" x="303" y="143">remove gangue</text><path class="a" d="M505,130 L570,130"/><rect class="card" x="570" y="85" width="220" height="90" rx="14"/><text class="t" x="588" y="117">Conversion</text><text class="s" x="588" y="143">roast / calcine</text><path class="a" d="M790,130 L855,130"/><rect class="card" x="855" y="85" width="220" height="90" rx="14"/><text class="t" x="873" y="117">Reduction</text><text class="s" x="873" y="143">metal winning</text><path class="a" d="M1075,130 L1140,130"/><rect class="card" x="1140" y="85" width="190" height="90" rx="14"/><text class="t" x="1158" y="117">Refining</text><text class="s" x="1158" y="143">pure metal</text><text class="s" x="35" y="230">Physical separation → chemical conversion → reduction → purification</text></svg>