<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 330" role="img"><style>.bg{fill:#0e1626}.card{fill:#111c30;stroke:#334a6b;stroke-width:2}.t{fill:#eaf2ff;font:600 22px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.s{fill:#a9bdd5;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.a{stroke:#47d7ff;stroke-width:3;fill:none;marker-end:url(#m)}.hot{fill:#ffb86b}.cyan{fill:#5de1ff}.green{fill:#78e6ad}.line{stroke:#7891b2;stroke-width:2;fill:none}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#47d7ff"/></marker></defs><rect class="bg" width="1450" height="330" rx="20"/><rect class="card" x="40" y="120" width="160" height="90" rx="14"/><text class="t" x="58" y="152">CuFeS₂</text><text class="s" x="58" y="178">flotation</text><path class="a" d="M200,165 L270,165"/><rect class="card" x="270" y="120" width="160" height="90" rx="14"/><text class="t" x="288" y="152">Roasting</text><text class="s" x="288" y="178">FeS → FeO</text><path class="a" d="M430,165 L500,165"/><rect class="card" x="500" y="120" width="160" height="90" rx="14"/><text class="t" x="518" y="152">Smelting</text><text class="s" x="518" y="178">matte Cu₂S+FeS</text><path class="a" d="M660,165 L730,165"/><rect class="card" x="730" y="120" width="190" height="90" rx="14"/><text class="t" x="748" y="152">Converter</text><text class="s" x="748" y="178">Fe slag; Cu₂O</text><path class="a" d="M920,165 L990,165"/><rect class="card" x="990" y="120" width="180" height="90" rx="14"/><text class="t" x="1008" y="152">Self reduction</text><text class="s" x="1008" y="178">blister Cu</text><path class="a" d="M1170,165 L1235,165"/><rect class="card" x="1235" y="120" width="170" height="90" rx="14"/><text class="t" x="1253" y="152">Refining</text><text class="s" x="1253" y="178">99.9+% Cu</text><text class="s" x="500" y="270">Key: 2Cu₂O + Cu₂S → 6Cu + SO₂</text></svg>