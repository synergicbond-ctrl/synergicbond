<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img"><style>.bg{fill:#0e1626}.card{fill:#111c30;stroke:#334a6b;stroke-width:2}.t{fill:#eaf2ff;font:600 22px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.s{fill:#a9bdd5;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.a{stroke:#47d7ff;stroke-width:3;fill:none;marker-end:url(#m)}.hot{fill:#ffb86b}.cyan{fill:#5de1ff}.green{fill:#78e6ad}.line{stroke:#7891b2;stroke-width:2;fill:none}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#47d7ff"/></marker></defs><rect class="bg" width="900" height="360" rx="20"/><text class="t" x="40" y="45">Zone refining — moving molten zone</text><rect class="card" x="100" y="150" width="700" height="100" rx="50"/><rect x="410" y="150" width="120" height="100" rx="40" fill="#ff9f6e" opacity=".75"/><path class="a" d="M300 110 L650 110"/><text class="s" x="390" y="100">heater / molten zone moves</text><circle cx="150" cy="200" r="6" class="cyan"/><circle cx="200" cy="200" r="6" class="cyan"/><circle cx="255" cy="200" r="6" class="cyan"/><circle cx="325" cy="200" r="6" class="cyan"/><circle cx="365" cy="200" r="6" class="cyan"/><circle cx="455" cy="200" r="6" class="cyan"/><circle cx="480" cy="200" r="6" class="cyan"/><circle cx="500" cy="200" r="6" class="cyan"/><circle cx="560" cy="200" r="6" class="cyan"/><circle cx="620" cy="200" r="6" class="cyan"/><circle cx="700" cy="200" r="6" class="cyan"/><circle cx="750" cy="200" r="6" class="cyan"/><text class="s" x="100" y="310">purified solid crystallises behind</text><text class="s" x="590" y="310">impurities swept toward end</text></svg>